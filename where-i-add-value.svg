    <linearGradient id="accent" x1="70" y1="490" x2="1010" y2="80" gradientUnits="userSpaceOnUse"><stop stop-color="#6C63FF"/><stop offset="1" stop-color="#00E5C3"/></linearGradient>
    <linearGradient id="card" x1="70" y1="130" x2="1010" y2="480" gradientUnits="userSpaceOnUse"><stop stop-color="#111827" stop-opacity="0.92"/><stop offset="1" stop-color="#0B1220" stop-opacity="0.78"/></linearGradient>
    <filter id="shadow" x="-12%" y="-22%" width="124%" height="144%"><feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000000" flood-opacity="0.32"/></filter>
